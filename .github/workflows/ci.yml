name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-and-hr-smoke:
    name: Quality + HR Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://postgres:sgs_password@localhost:5432/sgs_db_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: sgs_password
          POSTGRES_DB: sgs_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sgs_db_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm -F @school-mgmt/shared prisma generate

      - name: Apply Database Migrations
        run: pnpm -F @school-mgmt/shared prisma migrate deploy

      - name: Seed Database
        run: pnpm -F @school-mgmt/shared prisma db seed

      - name: Run Lint
        run: pnpm lint

      - name: Run Unit Tests
        run: pnpm test

      - name: Build API (for smoke test)
        run: pnpm -F @school-mgmt/api build

      - name: Run HR Smoke Test
        run: |
          pnpm -F @school-mgmt/api start > /tmp/api.log 2>&1 &
          API_PID=$!
          trap "kill ${API_PID}" EXIT

          for i in {1..30}; do
            if curl -fsS http://localhost:3001/api/v1/health >/dev/null; then
              break
            fi
            sleep 2
          done

          pnpm test:hr:e2e

      - name: Upload API log (if failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: api-log
          path: /tmp/api.log
          retention-days: 7
