name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: sgs_password
          POSTGRES_DB: sgs_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm -F @school-mgmt/shared prisma generate
        env:
          DATABASE_URL: postgresql://postgres:sgs_password@localhost:5432/sgs_db_test?schema=public

      - name: Run Database Migrations
        run: pnpm -F @school-mgmt/shared prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:sgs_password@localhost:5432/sgs_db_test?schema=public

      - name: Seed Database
        run: pnpm -F @school-mgmt/shared prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:sgs_password@localhost:5432/sgs_db_test?schema=public

      - name: Run Lint
        run: pnpm lint

      - name: Build all packages
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:sgs_password@localhost:5432/sgs_db_test?schema=public

      - name: Run Unit Tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:sgs_password@localhost:5432/sgs_db_test?schema=public

      - name: Install Playwright Browsers
        run: pnpm -F @school-mgmt/e2e exec playwright install --with-deps

      - name: Run E2E Tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://postgres:sgs_password@localhost:5432/sgs_db_test?schema=public
          BASE_URL: http://localhost:5173

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
