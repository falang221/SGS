version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sgs-postgres-prod
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sgs_prod_password}
      POSTGRES_DB: ${DB_NAME:-sgs_db_prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sgs-redis-prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sgs-api-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-sgs_prod_password}@postgres:5432/${DB_NAME:-sgs_db_prod}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: sgs-worker-prod
    restart: always
    depends_on:
      - api
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-sgs_prod_password}@postgres:5432/${DB_NAME:-sgs_db_prod}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api/v1}
    container_name: sgs-web-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_prod_data:
  redis_prod_data:
