services:
  postgres:
    image: postgres:15-alpine
    container_name: sgs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: sgs_password
      POSTGRES_DB: sgs_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sgs-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
